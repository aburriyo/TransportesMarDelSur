    <!-- Quick Contact Button Styles - Inlined for performance -->
    <style>
        .quick-contact-fab{position:fixed;bottom:30px;right:30px;z-index:1000;display:flex;flex-direction:column;gap:12px;animation:slideInUp .5s ease-out}
        .contact-btn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .3s ease;position:relative}
        .contact-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.4)}
        .contact-btn:active{transform:scale(.95)}
        .contact-btn i{font-size:28px}
        .contact-btn.whatsapp{background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);animation:pulse 2s infinite}
        .contact-btn.whatsapp:hover{background:linear-gradient(135deg,#128C7E 0%,#075E54 100%)}
        .contact-btn.phone{background:linear-gradient(135deg,#FFD600 0%,#FFA500 100%);color:#1a1a1a}
        .contact-btn.phone:hover{background:linear-gradient(135deg,#FFA500 0%,#FF8C00 100%)}
        .contact-btn::before{content:attr(data-tooltip);position:absolute;right:70px;background:rgba(0,0,0,.85);color:#fff;padding:8px 16px;border-radius:6px;white-space:nowrap;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s ease;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        .contact-btn:hover::before{opacity:1}
        .contact-btn::after{content:'';position:absolute;right:60px;border:6px solid transparent;border-left-color:rgba(0,0,0,.85);opacity:0;pointer-events:none;transition:opacity .3s ease}
        .contact-btn:hover::after{opacity:1}
        .contact-btn:focus{outline:3px solid #FFD600;outline-offset:2px}
        .contact-btn:focus:not(:focus-visible){outline:none}
        @keyframes slideInUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes pulse{0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.3)}50%{box-shadow:0 4px 20px rgba(37,211,102,.6)}}
        @media(max-width:768px){.quick-contact-fab{bottom:20px;right:20px;gap:10px}.contact-btn{width:56px;height:56px}.contact-btn i{font-size:24px}.contact-btn::before,.contact-btn::after{display:none}}
        @media(max-width:480px){.quick-contact-fab{bottom:15px;right:15px}.contact-btn{width:50px;height:50px}.contact-btn i{font-size:22px}}
        @media print{.quick-contact-fab{display:none}}
    </style>

    <style>
        .hazard-stripe {
            background: repeating-linear-gradient(45deg,
                    #FFD600,
                    #FFD600 20px,
                    #2D2D2D 20px,
                    #2D2D2D 40px);
        }

        /* Carousel Animation */
        .carousel-track {
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* Hide scrollbar for carousel */
        .carousel-container::-webkit-scrollbar {
            display: none;
        }

        .carousel-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Hero Background Animation */
        @keyframes slowZoom {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        .hero-bg-image {
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        /* Fade in animation for hero content */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-content {
            animation: fadeInUp 1s ease-out;
        }

        /* Floating particles effect */
        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.1;
            }
            25% {
                transform: translateY(-20px) translateX(10px);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-40px) translateX(-10px);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-20px) translateX(10px);
                opacity: 0.3;
            }
        }

        .floating-particle {
            position: absolute;
            background: rgba(255, 214, 0, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .floating-particle:nth-child(1) {
            width: 8px; height: 8px;
            top: 20%; left: 10%;
            animation-delay: 0s;
            animation-duration: 8s;
        }
        .floating-particle:nth-child(2) {
            width: 12px; height: 12px;
            top: 40%; left: 80%;
            animation-delay: 2s;
            animation-duration: 10s;
        }
        .floating-particle:nth-child(3) {
            width: 6px; height: 6px;
            top: 60%; left: 20%;
            animation-delay: 4s;
            animation-duration: 12s;
        }
        .floating-particle:nth-child(4) {
            width: 10px; height: 10px;
            top: 30%; left: 60%;
            animation-delay: 1s;
            animation-duration: 9s;
        }
        .floating-particle:nth-child(5) {
            width: 8px; height: 8px;
            top: 70%; left: 70%;
            animation-delay: 3s;
            animation-duration: 11s;
        }
        .floating-particle:nth-child(6) {
            width: 14px; height: 14px;
            top: 50%; left: 30%;
            animation-delay: 5s;
            animation-duration: 7s;
        }
    </style>
</head>
