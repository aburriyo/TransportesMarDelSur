# HTTP only - SSL will be configured after domain setup
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;

    access_log /var/log/nginx/mardelsur_access.log;
    error_log /var/log/nginx/mardelsur_error.log;

    # Allow certbot validation (for future SSL setup)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static files - serve directly with caching
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy to Flask application
    location / {
        proxy_pass http://web:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
