<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D3D3D"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2D2D2D" stroke-width="16"/>

  <!-- Truck body -->
  <rect x="100" y="200" width="200" height="120" rx="8" fill="url(#truckGrad)"/>

  <!-- Truck cabin -->
  <path d="M300 200 L300 320 L380 320 L380 260 L340 200 Z" fill="url(#truckGrad)"/>

  <!-- Cabin window -->
  <path d="M310 210 L310 250 L370 250 L340 210 Z" fill="#87CEEB"/>

  <!-- Wheels -->
  <circle cx="160" cy="330" r="35" fill="#2D2D2D"/>
  <circle cx="160" cy="330" r="20" fill="#555"/>
  <circle cx="160" cy="330" r="8" fill="#2D2D2D"/>

  <circle cx="340" cy="330" r="35" fill="#2D2D2D"/>
  <circle cx="340" cy="330" r="20" fill="#555"/>
  <circle cx="340" cy="330" r="8" fill="#2D2D2D"/>

  <!-- Hazard stripes on truck -->
  <g clip-path="url(#truckClip)">
    <rect x="100" y="200" width="200" height="30" fill="#FFD600"/>
    <line x1="100" y1="230" x2="300" y2="230" stroke="#2D2D2D" stroke-width="3"/>
  </g>

  <!-- MS initials -->
  <text x="175" y="290" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#FFD600">MS</text>

  <!-- Small hazard symbol -->
  <g transform="translate(390, 140) scale(0.4)">
    <polygon points="60,0 120,104 0,104" fill="#FFD600" stroke="#2D2D2D" stroke-width="8"/>
    <text x="60" y="85" text-anchor="middle" font-family="Arial Black" font-size="50" font-weight="900" fill="#2D2D2D">!</text>
  </g>
</svg>
