<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Red diamond background (Clase 2 - Gases Inflamables) -->
  <g transform="translate(100, 100) rotate(45)">
    <rect x="-70" y="-70" width="140" height="140" fill="#E31E24" stroke="black" stroke-width="3"/>
    <rect x="-65" y="-65" width="130" height="130" fill="none" stroke="white" stroke-width="2"/>
  </g>

  <!-- Flame symbol -->
  <g transform="translate(100, 80)">
    <path d="M 0 -30 C -5 -25 -10 -15 -10 -5 C -10 5 -7 12 0 20 C 7 12 10 5 10 -5 C 10 -15 5 -25 0 -30 Z
             M 0 -20 C 3 -17 6 -12 6 -5 C 6 0 4 5 0 10 C -4 5 -6 0 -6 -5 C -6 -12 -3 -17 0 -20 Z"
          fill="white" stroke="black" stroke-width="1.5"/>
    <path d="M 0 10 C -4 5 -6 0 -6 -5 C -6 -12 -3 -17 0 -20 C 3 -17 6 -12 6 -5 C 6 0 4 5 0 10 Z"
          fill="#E31E24"/>
  </g>

  <!-- Cylinder symbol -->
  <g transform="translate(100, 115)">
    <ellipse cx="0" cy="-15" rx="8" ry="3" fill="white" stroke="black" stroke-width="1.5"/>
    <rect x="-8" y="-15" width="16" height="20" fill="white" stroke="black" stroke-width="1.5"/>
    <ellipse cx="0" cy="5" rx="8" ry="3" fill="white" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Text -->
  <text x="100" y="150" font-family="Arial Black, sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle">GASES</text>
  <text x="100" y="163" font-family="Arial Black, sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle">INFLAMABLES</text>

  <!-- Class number -->
  <g transform="translate(100, 180)">
    <rect x="-12" y="-12" width="24" height="20" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial Black, sans-serif" font-size="16" font-weight="bold"
          fill="black" text-anchor="middle">2</text>
  </g>
</svg>