<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White diamond background (Clase 6 - Tóxicos) -->
  <g transform="translate(100, 100) rotate(45)">
    <rect x="-70" y="-70" width="140" height="140" fill="white" stroke="black" stroke-width="3"/>
    <rect x="-65" y="-65" width="130" height="130" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <!-- Skull and crossbones -->
  <g transform="translate(100, 80)">
    <!-- Skull -->
    <ellipse cx="0" cy="-8" rx="14" ry="16" fill="black"/>
    <ellipse cx="0" cy="2" rx="11" ry="8" fill="black"/>

    <!-- Eye sockets -->
    <ellipse cx="-6" cy="-10" rx="4" ry="5" fill="white"/>
    <ellipse cx="6" cy="-10" rx="4" ry="5" fill="white"/>

    <!-- Nose -->
    <path d="M -2 -2 L 0 2 L 2 -2 Z" fill="white"/>

    <!-- Jaw line -->
    <rect x="-7" y="4" width="4" height="6" rx="1" fill="white"/>
    <rect x="-2" y="4" width="4" height="6" rx="1" fill="white"/>
    <rect x="3" y="4" width="4" height="6" rx="1" fill="white"/>

    <!-- Crossbones -->
    <g transform="translate(0, 25)">
      <rect x="-20" y="-3" width="40" height="6" rx="3" fill="black"/>
      <ellipse cx="-20" cy="0" rx="4" ry="5" fill="black"/>
      <ellipse cx="20" cy="0" rx="4" ry="5" fill="black"/>

      <g transform="rotate(90)">
        <rect x="-20" y="-3" width="40" height="6" rx="3" fill="black"/>
        <ellipse cx="-20" cy="0" rx="4" ry="5" fill="black"/>
        <ellipse cx="20" cy="0" rx="4" ry="5" fill="black"/>
      </g>
    </g>
  </g>

  <!-- Text -->
  <text x="100" y="145" font-family="Arial Black, sans-serif" font-size="12" font-weight="bold"
        fill="black" text-anchor="middle">TÓXICO</text>

  <!-- Class number -->
  <g transform="translate(100, 168)">
    <rect x="-12" y="-12" width="24" height="20" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial Black, sans-serif" font-size="16" font-weight="bold"
          fill="black" text-anchor="middle">6</text>
  </g>
</svg>