<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer decorative circle -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#2e7d32" stroke-width="3"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#2e7d32" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Main background circle -->
  <circle cx="200" cy="200" r="170" fill="url(#bgGrad)"/>

  <!-- Inner white circle -->
  <circle cx="200" cy="200" r="160" fill="white"/>

  <!-- Top decorative ribbon -->
  <path d="M 100 80 Q 200 60 300 80" fill="none" stroke="url(#ribbonGrad)" stroke-width="8"/>

  <!-- Certificate icon/seal at top -->
  <g transform="translate(200, 75)">
    <circle cx="0" cy="0" r="25" fill="#ffd700" stroke="#2e7d32" stroke-width="2"/>
    <path d="M -10 -5 L 0 -15 L 10 -5 L 5 5 L 0 0 L -5 5 Z" fill="#2e7d32"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(200, 140)">
    <path d="M 0 -30 C -20 -30 -35 -25 -35 -20 L -35 0 C -35 15 -20 25 0 35 C 20 25 35 15 35 0 L 35 -20 C 35 -25 20 -30 0 -30 Z"
          fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
    <path d="M -15 -5 L -8 5 L 15 -15" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main text -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold"
        fill="#2e7d32" text-anchor="middle">DS 298</text>

  <!-- Subtitle -->
  <text x="200" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="#1b5e20" text-anchor="middle">CERTIFICADO</text>

  <!-- Description line 1 -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="11"
        fill="#424242" text-anchor="middle">Cumplimiento Normativo</text>

  <!-- Description line 2 -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="11"
        fill="#424242" text-anchor="middle">Transporte Cargas Peligrosas</text>

  <!-- Year badge -->
  <g transform="translate(200, 300)">
    <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#ffd700" stroke="#2e7d32" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
          fill="#2e7d32" text-anchor="middle">2025</text>
  </g>

  <!-- Bottom decorative elements -->
  <path d="M 120 330 L 140 345 L 130 335 Z" fill="#2e7d32" opacity="0.3"/>
  <path d="M 280 330 L 260 345 L 270 335 Z" fill="#2e7d32" opacity="0.3"/>

  <!-- Decorative stars -->
  <g opacity="0.2">
    <path d="M 80 200 l 3 9 l 9 0 l -7 5 l 3 9 l -7 -5 l -7 5 l 3 -9 l -7 -5 l 9 0 Z" fill="#2e7d32"/>
    <path d="M 320 200 l 3 9 l 9 0 l -7 5 l 3 9 l -7 -5 l -7 5 l 3 -9 l -7 -5 l 9 0 Z" fill="#2e7d32"/>
  </g>

</svg>