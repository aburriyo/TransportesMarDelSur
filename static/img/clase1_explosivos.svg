<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Orange diamond background (Clase 1 - Explosivos) -->
  <g transform="translate(100, 100) rotate(45)">
    <rect x="-70" y="-70" width="140" height="140" fill="#FF6B00" stroke="black" stroke-width="3"/>
    <rect x="-65" y="-65" width="130" height="130" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <!-- Explosion symbol -->
  <g transform="translate(100, 85)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="8" fill="black"/>

    <!-- Explosion rays -->
    <path d="M 0 -25 L -6 -10 L 0 -12 L 6 -10 Z" fill="black"/>
    <path d="M 17 -17 L 7 -7 L 10 -4 L 13 -10 Z" fill="black"/>
    <path d="M 25 0 L 10 -3 L 12 0 L 10 3 Z" fill="black"/>
    <path d="M 17 17 L 13 10 L 10 4 L 7 7 Z" fill="black"/>
    <path d="M 0 25 L 6 10 L 0 12 L -6 10 Z" fill="black"/>
    <path d="M -17 17 L -7 7 L -10 4 L -13 10 Z" fill="black"/>
    <path d="M -25 0 L -10 3 L -12 0 L -10 -3 Z" fill="black"/>
    <path d="M -17 -17 L -13 -10 L -10 -4 L -7 -7 Z" fill="black"/>
  </g>

  <!-- Text "EXPLOSIVOS" -->
  <text x="100" y="135" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold"
        fill="black" text-anchor="middle">EXPLOSIVOS</text>

  <!-- Class number -->
  <g transform="translate(100, 160)">
    <rect x="-12" y="-12" width="24" height="20" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial Black, sans-serif" font-size="16" font-weight="bold"
          fill="black" text-anchor="middle">1</text>
  </g>
</svg>