<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="health-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Decorative border -->
  <rect x="10" y="10" width="380" height="280" rx="8" fill="none" stroke="#00695c" stroke-width="3"/>
  <rect x="18" y="18" width="364" height="264" rx="5" fill="none" stroke="#00897b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Header ribbon -->
  <path d="M 30 40 L 370 40 L 370 85 L 200 95 L 30 85 Z" fill="url(#health-grad)"/>

  <!-- Medical cross icon -->
  <g transform="translate(60, 62.5)">
    <circle cx="0" cy="0" r="18" fill="white"/>
    <rect x="-2.5" y="-12" width="5" height="24" rx="1" fill="#00695c"/>
    <rect x="-12" y="-2.5" width="24" height="5" rx="1" fill="#00695c"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(340, 62.5)">
    <path d="M 0 -15 C -10 -15 -15 -12 -15 -10 L -15 0 C -15 8 -10 13 0 18 C 10 13 15 8 15 0 L 15 -10 C 15 -12 10 -15 0 -15 Z"
          fill="white" stroke="white" stroke-width="1"/>
    <path d="M -7 0 L -3 4 L 7 -8" fill="none" stroke="#00695c" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="200" y="72" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        fill="white" text-anchor="middle">RESOLUCIÓN SANITARIA</text>

  <!-- Main content box -->
  <rect x="40" y="115" width="320" height="140" rx="5" fill="#e0f2f1" stroke="#00897b" stroke-width="1"/>

  <!-- Content text -->
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="600"
        fill="#00695c" text-anchor="middle">Autorización Sanitaria</text>

  <text x="200" y="168" font-family="Arial, sans-serif" font-size="12"
        fill="#424242" text-anchor="middle">Transporte de Residuos Peligrosos</text>
  <text x="200" y="185" font-family="Arial, sans-serif" font-size="12"
        fill="#424242" text-anchor="middle">y Sustancias Peligrosas (RESPEL)</text>

  <!-- Resolution number box -->
  <rect x="100" y="200" width="200" height="35" rx="5" fill="white" stroke="#00897b" stroke-width="2"/>
  <text x="200" y="215" font-family="Courier New, monospace" font-size="10" font-weight="600"
        fill="#757575" text-anchor="middle">N° RESOLUCIÓN</text>
  <text x="200" y="230" font-family="Courier New, monospace" font-size="13" font-weight="bold"
        fill="#00695c" text-anchor="middle">2510389969</text>

  <!-- Bottom stamp -->
  <g transform="translate(200, 270)">
    <ellipse cx="0" cy="0" rx="55" ry="12" fill="#00695c" opacity="0.15"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          fill="#00695c" text-anchor="middle" opacity="0.7">MINSAL</text>
  </g>

  <!-- Corner accents -->
  <path d="M 30 30 L 40 30 L 30 40 Z" fill="#00897b" opacity="0.3"/>
  <path d="M 370 30 L 360 30 L 370 40 Z" fill="#00897b" opacity="0.3"/>
</svg>