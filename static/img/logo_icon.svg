<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconGearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E31E24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconTruckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D2D2D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Gear -->
  <g transform="translate(50, 50)">
    <!-- Outer gear -->
    <circle cx="0" cy="0" r="38" fill="url(#iconGearGrad)" opacity="0.15"/>
    <!-- Gear teeth -->
    <path d="M 0 -40 L 5 -36 L 5 -32 L 0 -35 Z
             M 28 -28 L 32 -24 L 29 -20 L 25 -24 Z
             M 40 0 L 36 5 L 32 5 L 35 0 Z
             M 28 28 L 24 32 L 20 29 L 24 25 Z
             M 0 40 L -5 36 L -5 32 L 0 35 Z
             M -28 28 L -32 24 L -29 20 L -25 24 Z
             M -40 0 L -36 -5 L -32 -5 L -35 0 Z
             M -28 -28 L -24 -32 L -20 -29 L -24 -25 Z"
          fill="#E31E24" opacity="0.3"/>
  </g>

  <!-- Truck -->
  <g transform="translate(30, 45)">
    <!-- Container -->
    <rect x="0" y="0" width="28" height="16" rx="1.5" fill="url(#iconTruckGrad)"/>
    <!-- Cabin -->
    <path d="M 28 4 L 38 4 L 38 16 L 28 16 Z" fill="url(#iconTruckGrad)"/>
    <path d="M 28 4 L 32 0 L 38 0 L 38 4 Z" fill="#3a3a3a"/>
    <!-- Windows -->
    <rect x="30" y="6" width="3" height="5" fill="#5a5a5a"/>
    <rect x="34" y="6" width="3" height="5" fill="#5a5a5a"/>
    <!-- Wheels with hazard yellow -->
    <circle cx="8" cy="18" r="3.5" fill="#2D2D2D" stroke="#FFD600" stroke-width="1.5"/>
    <circle cx="8" cy="18" r="1.5" fill="#5a5a5a"/>
    <circle cx="32" cy="18" r="3.5" fill="#2D2D2D" stroke="#FFD600" stroke-width="1.5"/>
    <circle cx="32" cy="18" r="1.5" fill="#5a5a5a"/>
    <!-- Hazard stripes -->
    <path d="M 4 2 L 6 2 L 4 4 Z M 8 2 L 10 2 L 8 4 Z M 12 2 L 14 2 L 12 4 Z M 16 2 L 18 2 L 16 4 Z"
          fill="#FFD600" opacity="0.9"/>
  </g>

  <!-- Small "M" badge -->
  <g transform="translate(72, 28)">
    <circle cx="0" cy="0" r="12" fill="#FFD600"/>
    <text x="0" y="5" font-family="Arial Black, sans-serif" font-size="14" font-weight="900"
          fill="#2D2D2D" text-anchor="middle">M</text>
  </g>
</svg>