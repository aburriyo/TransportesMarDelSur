<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <defs>
    <linearGradient id="sidrep-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect x="10" y="10" width="380" height="380" rx="15" fill="none" stroke="#0d47a1" stroke-width="4"/>
  <rect x="20" y="20" width="360" height="360" rx="10" fill="white"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="360" height="80" rx="10" fill="url(#sidrep-bg)"/>

  <!-- Chile flag colors accent -->
  <rect x="30" y="30" width="8" height="60" rx="2" fill="#D52B1E"/>
  <rect x="42" y="30" width="8" height="28" rx="2" fill="white"/>
  <rect x="42" y="62" width="8" height="28" rx="2" fill="#0039A6"/>
  <path d="M 46 70 l 2 6 l 6 0 l -5 4 l 2 6 l -5 -4 l -5 4 l 2 -6 l -5 -4 l 6 0 Z" fill="white"/>

  <!-- Logo area -->
  <circle cx="200" cy="60" r="28" fill="white" opacity="0.95"/>
  <g transform="translate(200, 60)">
    <path d="M 0 -18 C -10 -18 -18 -10 -18 0 C -18 10 -10 18 0 18 C 10 18 18 10 18 0 C 18 -10 10 -18 0 -18 Z"
          fill="none" stroke="#0d47a1" stroke-width="2"/>
    <path d="M -10 0 L -3 0 L -3 -8 C -3 -10 -1 -12 1 -12 C 3 -12 5 -10 5 -8 L 5 8 C 5 10 3 12 1 12 C -1 12 -3 10 -3 8 L -3 4 L -10 4"
          fill="none" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="9" cy="0" r="3" fill="#0d47a1"/>
  </g>

  <!-- Main heading -->
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="#0d47a1" text-anchor="middle">SIDREP</text>

  <!-- Subheading -->
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="600"
        fill="#1976d2" text-anchor="middle">Sistema de Declaración y Seguimiento</text>

  <!-- Badge/Seal -->
  <g transform="translate(200, 230)">
    <circle cx="0" cy="0" r="50" fill="#e3f2fd" stroke="#0d47a1" stroke-width="3"/>
    <circle cx="0" cy="0" r="42" fill="white"/>
    <path d="M 0 -30 L 8 -10 L 30 -10 L 12 5 L 20 25 L 0 10 L -20 25 L -12 5 L -30 -10 L -8 -10 Z"
          fill="#ffd700" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          fill="#0d47a1" text-anchor="middle">OK</text>
  </g>

  <!-- Info text -->
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="11"
        fill="#424242" text-anchor="middle">Residuos Peligrosos</text>
  <text x="200" y="318" font-family="Arial, sans-serif" font-size="11"
        fill="#424242" text-anchor="middle">Ministerio de Salud</text>

  <!-- Bottom accent -->
  <rect x="80" y="340" width="240" height="3" rx="1.5" fill="#1976d2" opacity="0.3"/>

  <!-- Date badge -->
  <g transform="translate(200, 360)">
    <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#0d47a1"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
          fill="white" text-anchor="middle">Vigente</text>
  </g>
</svg>