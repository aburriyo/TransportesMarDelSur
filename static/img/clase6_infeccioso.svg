<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White diamond background (Clase 6.2 - Infeccioso) -->
  <g transform="translate(100, 100) rotate(45)">
    <rect x="-70" y="-70" width="140" height="140" fill="white" stroke="black" stroke-width="3"/>
    <rect x="-65" y="-65" width="130" height="130" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <!-- Biohazard Symbol -->
  <g transform="translate(100, 75)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="8" fill="black"/>
    <circle cx="0" cy="0" r="4" fill="white"/>

    <!-- Three outer circles with cutouts -->
    <g>
      <!-- Top lobe -->
      <path d="M 0,-30
               A 18,18 0 1,1 15.5,9
               L 8,5
               A 10,10 0 0,0 0,-17
               A 10,10 0 0,0 -8,5
               L -15.5,9
               A 18,18 0 1,1 0,-30
               Z" fill="black"/>

      <!-- Bottom right lobe -->
      <path d="M 26,15
               A 18,18 0 1,1 -10,28
               L -5,18
               A 10,10 0 0,0 8,5
               A 10,10 0 0,0 15,15
               L 10,28
               A 18,18 0 1,1 26,15
               Z" fill="black" transform="rotate(120)"/>

      <!-- Bottom left lobe -->
      <path d="M 26,15
               A 18,18 0 1,1 -10,28
               L -5,18
               A 10,10 0 0,0 8,5
               A 10,10 0 0,0 15,15
               L 10,28
               A 18,18 0 1,1 26,15
               Z" fill="black" transform="rotate(240)"/>
    </g>

    <!-- Simplified biohazard using overlapping circles -->
    <circle cx="0" cy="-18" r="14" fill="black"/>
    <circle cx="15.5" cy="9" r="14" fill="black"/>
    <circle cx="-15.5" cy="9" r="14" fill="black"/>

    <!-- Inner white ring -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="6"/>

    <!-- Cut lines -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="white" stroke-width="4"/>
    <line x1="0" y1="0" x2="30" y2="17" stroke="white" stroke-width="4"/>
    <line x1="0" y1="0" x2="-30" y2="17" stroke="white" stroke-width="4"/>

    <!-- Center black circle -->
    <circle cx="0" cy="0" r="6" fill="black"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>

  <!-- Text -->
  <text x="100" y="140" font-family="Arial Black, sans-serif" font-size="10" font-weight="bold"
        fill="black" text-anchor="middle">INFECCIOSO</text>

  <!-- Class number -->
  <g transform="translate(100, 165)">
    <rect x="-15" y="-12" width="30" height="20" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial Black, sans-serif" font-size="12" font-weight="bold"
          fill="black" text-anchor="middle">6.2</text>
  </g>
</svg>
