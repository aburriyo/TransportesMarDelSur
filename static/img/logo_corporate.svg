<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70">
  <defs>
    <linearGradient id="corpBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="corpTruck" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield badge background -->
  <path d="M 35 5 L 60 5 L 65 10 L 65 55 C 65 60 60 65 50 68 C 40 65 35 60 35 55 Z"
        fill="url(#corpBadge)" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Inner shield detail -->
  <path d="M 40 12 L 55 12 L 58 16 L 58 52 C 58 55 55 58 50 60 C 45 58 42 55 42 52 Z"
        fill="white" opacity="0.1"/>

  <!-- Truck -->
  <g transform="translate(20, 28)">
    <!-- Container -->
    <rect x="0" y="8" width="26" height="13" rx="1" fill="url(#corpTruck)"/>
    <!-- Safety stripe -->
    <rect x="2" y="10" width="22" height="2" fill="#0ea5e9"/>
    <rect x="2" y="17" width="22" height="2" fill="#0ea5e9"/>

    <!-- Cabin -->
    <path d="M 26 11 L 35 11 L 35 21 L 26 21 Z" fill="url(#corpTruck)"/>
    <path d="M 26 11 L 29 7 L 35 7 L 35 11 Z" fill="#1e293b"/>
    <!-- Windows -->
    <rect x="28" y="13" width="2.5" height="4" fill="#64748b" rx="0.5"/>
    <rect x="31.5" y="13" width="2.5" height="4" fill="#64748b" rx="0.5"/>

    <!-- Professional wheels -->
    <g>
      <circle cx="7" cy="23" r="3.5" fill="#0f172a"/>
      <circle cx="7" cy="23" r="2.8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
      <circle cx="7" cy="23" r="1.2" fill="#0ea5e9"/>
    </g>
    <g>
      <circle cx="28" cy="23" r="3.5" fill="#0f172a"/>
      <circle cx="28" cy="23" r="2.8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
      <circle cx="28" cy="23" r="1.2" fill="#0ea5e9"/>
    </g>
  </g>

  <!-- Company text -->
  <g transform="translate(75, 22)">
    <!-- TRANSPORTE -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="600"
          fill="#475569" letter-spacing="2">TRANSPORTE</text>

    <!-- MAR DEL SUR -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="22" font-weight="900"
          fill="#0f172a" letter-spacing="1">MAR DEL</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="900"
          fill="#1e40af" letter-spacing="1.5">SUR</text>
  </g>

  <!-- Certification badge -->
  <g transform="translate(260, 35)">
    <circle cx="0" cy="0" r="18" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5"/>
    <path d="M 0 -10 L 3 -3 L 10 -3 L 4 2 L 7 9 L 0 4 L -7 9 L -4 2 L -10 -3 L -3 -3 Z"
          fill="#0ea5e9"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="8" font-weight="700"
          fill="#0f172a" text-anchor="middle">DS</text>
    <text x="0" y="11" font-family="Arial, sans-serif" font-size="6" font-weight="700"
          fill="#0f172a" text-anchor="middle">298</text>
  </g>
</svg>