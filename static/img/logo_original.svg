<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <!-- Gradientes para darle profundidad -->
    <radialGradient id="gearGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8B8B8B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3A3A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Engranaje de fondo -->
  <g transform="translate(250, 200)">
    <!-- Círculo principal grande -->
    <circle cx="0" cy="0" r="150" fill="url(#gearGrad)" opacity="0.85"/>

    <!-- Dientes del engranaje (más angulares y pixelados como el original) -->
    <g fill="#6B7280" opacity="0.9">
      <!-- Diente superior -->
      <rect x="-20" y="-165" width="40" height="25"/>
      <!-- Diente superior derecha -->
      <rect x="55" y="-150" width="40" height="25" transform="rotate(30 75 -137.5)"/>
      <!-- Diente derecha -->
      <rect x="120" y="-100" width="40" height="25" transform="rotate(60 140 -87.5)"/>
      <!-- Diente inferior derecha arriba -->
      <rect x="150" y="-20" width="40" height="25" transform="rotate(90 170 -7.5)"/>
      <!-- Diente derecha abajo -->
      <rect x="145" y="55" width="40" height="25" transform="rotate(120 165 67.5)"/>
      <!-- Diente inferior derecha -->
      <rect x="100" y="120" width="40" height="25" transform="rotate(150 120 132.5)"/>
      <!-- Diente inferior -->
      <rect x="-20" y="140" width="40" height="25"/>
      <!-- Diente inferior izquierda -->
      <rect x="-140" y="120" width="40" height="25" transform="rotate(-150 -120 132.5)"/>
      <!-- Diente izquierda abajo -->
      <rect x="-185" y="55" width="40" height="25" transform="rotate(-120 -165 67.5)"/>
      <!-- Diente izquierda -->
      <rect x="-190" y="-20" width="40" height="25" transform="rotate(-90 -170 -7.5)"/>
      <!-- Diente izquierda arriba -->
      <rect x="-160" y="-100" width="40" height="25" transform="rotate(-60 -140 -87.5)"/>
      <!-- Diente superior izquierda -->
      <rect x="-95" y="-150" width="40" height="25" transform="rotate(-30 -75 -137.5)"/>
    </g>

    <!-- Círculo intermedio -->
    <circle cx="0" cy="0" r="120" fill="#8B8B8B" opacity="0.8"/>
    <!-- Círculo interior oscuro -->
    <circle cx="0" cy="0" r="50" fill="#3A3A3A"/>
  </g>

  <!-- Arcos rojos -->
  <g transform="translate(250, 200)">
    <!-- Arco superior derecho (curva gruesa roja) -->
    <path d="M 85 -110 Q 150 -90, 160 0 Q 165 50, 145 105"
          fill="none" stroke="#C1272D" stroke-width="45" stroke-linecap="round" opacity="0.95"/>

    <!-- Arco inferior izquierdo (curva gruesa roja) -->
    <path d="M -85 110 Q -150 90, -160 0 Q -165 -50, -145 -105"
          fill="none" stroke="#C1272D" stroke-width="45" stroke-linecap="round" opacity="0.95"/>

    <!-- Sombras internas de los arcos -->
    <path d="M 85 -110 Q 150 -90, 160 0 Q 165 50, 145 105"
          fill="none" stroke="#8B1E1E" stroke-width="25" stroke-linecap="round" opacity="0.4"/>
    <path d="M -85 110 Q -150 90, -160 0 Q -165 -50, -145 -105"
          fill="none" stroke="#8B1E1E" stroke-width="25" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Camión vista frontal (más detallado) -->
  <g transform="translate(250, 200)">
    <!-- Parte superior de la cabina -->
    <path d="M -65 -55 L -55 -70 L 55 -70 L 65 -55 Z" fill="#4A4A4A"/>

    <!-- Parabrisas principal -->
    <rect x="-60" y="-55" width="120" height="50" rx="3" fill="url(#truckGrad)"/>

    <!-- División del parabrisas -->
    <rect x="-3" y="-55" width="6" height="50" fill="#2A2A2A"/>

    <!-- Parabrisas izquierdo con reflejo -->
    <rect x="-55" y="-50" width="50" height="40" rx="2" fill="#4A4A4A"/>
    <path d="M -50 -45 L -30 -25" stroke="#6A6A6A" stroke-width="2" opacity="0.5"/>

    <!-- Parabrisas derecho con reflejo -->
    <rect x="5" y="-50" width="50" height="40" rx="2" fill="#4A4A4A"/>
    <path d="M 10 -45 L 30 -25" stroke="#6A6A6A" stroke-width="2" opacity="0.5"/>

    <!-- Parrilla/frente del camión -->
    <rect x="-70" y="0" width="140" height="45" rx="2" fill="#1A1A1A"/>

    <!-- Líneas horizontales de la parrilla -->
    <line x1="-65" y1="8" x2="65" y2="8" stroke="#3A3A3A" stroke-width="3"/>
    <line x1="-65" y1="16" x2="65" y2="16" stroke="#3A3A3A" stroke-width="3"/>
    <line x1="-65" y1="24" x2="65" y2="24" stroke="#3A3A3A" stroke-width="3"/>
    <line x1="-65" y1="32" x2="65" y2="32" stroke="#3A3A3A" stroke-width="3"/>
    <line x1="-65" y1="40" x2="65" y2="40" stroke="#3A3A3A" stroke-width="3"/>

    <!-- Líneas verticales de la parrilla -->
    <line x1="-50" y1="0" x2="-50" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-30" y1="0" x2="-30" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-10" y1="0" x2="-10" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="30" y1="0" x2="30" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="45" stroke="#3A3A3A" stroke-width="2"/>

    <!-- Faros delanteros -->
    <ellipse cx="-50" cy="52" rx="12" ry="8" fill="#D1D5DB"/>
    <ellipse cx="50" cy="52" rx="12" ry="8" fill="#D1D5DB"/>

    <!-- Brillo en los faros -->
    <ellipse cx="-48" cy="50" rx="5" ry="3" fill="#F3F4F6"/>
    <ellipse cx="52" cy="50" rx="5" ry="3" fill="#F3F4F6"/>

    <!-- Parachoques inferior -->
    <rect x="-75" y="60" width="150" height="12" rx="6" fill="#5A5A5A"/>
    <rect x="-70" y="63" width="140" height="6" rx="3" fill="#3A3A3A"/>

    <!-- Detalles laterales del camión -->
    <rect x="-75" y="-20" width="8" height="75" fill="#2A2A2A"/>
    <rect x="67" y="-20" width="8" height="75" fill="#2A2A2A"/>
  </g>

  <!-- Texto "Mar del Sur" estilo script cursivo rojo -->
  <g transform="translate(300, 400)">
    <text x="0" y="0"
          font-family="'Brush Script MT', 'Lucida Handwriting', cursive"
          font-size="95"
          font-weight="bold"
          font-style="italic"
          fill="#C1272D"
          text-anchor="middle"
          letter-spacing="-3"
          stroke="#8B1E1E"
          stroke-width="1">
      Mar del Sur
    </text>
    <!-- Sombra del texto para darle profundidad -->
    <text x="3" y="3"
          font-family="'Brush Script MT', 'Lucida Handwriting', cursive"
          font-size="95"
          font-weight="bold"
          font-style="italic"
          fill="#8B1E1E"
          text-anchor="middle"
          letter-spacing="-3"
          opacity="0.4"
          style="filter: blur(2px)">
      Mar del Sur
    </text>
  </g>
</svg>